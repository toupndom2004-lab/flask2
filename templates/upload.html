{% extends "base.html" %}

{% block content %}
<h2 class="mb-4">New Inspection</h2>

<div class="card">
  <div class="card-body">
    <form method="post" enctype="multipart/form-data">
      <div class="row">
        <div class="col-md-6">
          <div class="mb-3">
            <label for="inspector_name" class="form-label">Inspector Name</label>
            <input class="form-control" id="inspector_name" name="inspector_name" placeholder="e.g. Somchai" required>
          </div>
          <div class="mb-3">
            <label for="product_name" class="form-label">Product Name (ID)</label>
            <input class="form-control" id="product_name" name="product_name" placeholder="e.g. WeldPart-100" required>
          </div>
          <div class="mb-3">
            <label for="description" class="form-label">Product Description (optional)</label>
            <textarea class="form-control" id="description" name="description" rows="2" placeholder="e.g. Frame weld for module A"></textarea>
          </div>
          <div class="mb-3">
            <label for="lot_number" class="form-label">Lot Number</label>
            <input class="form-control" id="lot_number" name="lot_number" placeholder="e.g. LOT-2026-03" required>
          </div>
          <div class="mb-3">
            <label for="production_date" class="form-label">Production Date</label>
            <input class="form-control" id="production_date" name="production_date" type="date" required>
          </div>
        </div>
        <div class="col-md-6">
          <div class="mb-3">
            <label for="image" class="form-label">Weld Image</label>
            <input class="form-control" type="file" id="image" name="image" accept="image/*" required>
          </div>
          <p class="text-muted">
            Upload an image of the weld. The system will store the file and record the inspection result with traceability.
          </p>
        </div>
      </div>

      <button type="submit" class="btn btn-primary">Run Inspection</button>
    </form>
  </div>
</div>
{% endblock %}
